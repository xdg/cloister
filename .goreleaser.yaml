version: 2

builds:
  - main: ./cmd/cloister
    binary: cloister
    env:
      - CGO_ENABLED=0
    ldflags:
      - -X github.com/xdg/cloister/internal/version.Version={{ .Version }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: 'checksums.txt'

release:
  mode: replace
